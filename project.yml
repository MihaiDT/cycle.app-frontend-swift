name: CycleApp
options:
  bundleIdPrefix: app.cycle
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      OTHER_SWIFT_FLAGS: "-Xfrontend -serialize-debugging-options"
      EMIT_FRONTEND_COMMAND_LINES: YES
      OTHER_LDFLAGS:
        - -Xlinker
        - -interposable
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Tagged:
    url: https://github.com/pointfreeco/swift-tagged
    from: "0.10.0"
  SplineRuntime:
    url: https://github.com/splinetool/spline-ios
    from: "0.2.48"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.5.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: "1.5.2"
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  CycleApp:
    type: application
    platform: iOS
    sources:
      - CycleApp
      - path: Packages/Core
        excludes:
          - "Package.swift"
          - "Package.resolved"
          - ".build"
          - ".swiftpm"
          - "Sources"
      - path: Packages/Features
        excludes:
          - "Package.swift"
          - "Package.resolved"
          - ".build"
          - ".swiftpm"
          - "Sources"
    resources:
      - path: CycleApp/Resources/logo_animation.splineswift
      - path: CycleApp/Resources/glowing_orb.riv
    dependencies:
      - package: ComposableArchitecture
      - package: Tagged
      - package: SplineRuntime
      - package: Lottie
      - package: Inject
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: GoogleSignIn
      - package: RiveRuntime
      - sdk: HealthKit.framework
    entitlements:
      path: CycleApp/Resources/CycleApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        INFOPLIST_FILE: CycleApp/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.cycle.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  CycleAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CycleAppTests
    dependencies:
      - target: CycleApp
    settings:
      base:
        INFOPLIST_FILE: CycleAppTests/Info.plist

schemes:
  CycleApp:
    build:
      targets:
        CycleApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CycleAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
